# Nord theme
[colors]
bg       = #cc2e3440
bg-alt   = #cc3b4252
fg       = #d8dee9
fg-dim   = #4c566a
blue     = #88c0d0
blue-alt = #81a1c1
red      = #bf616a
green    = #a3be8c
yellow   = #ebcb8b
orange   = #d08770

[bar/main]
monitor               =
width                 = 100%
height                = 34
background            = ${colors.bg}
foreground            = ${colors.fg}
line-size             = 2
border-size           = 0
padding-left          = 2
padding-right         = 2
module-margin-right   = 1
font-0                = FiraCode Nerd Font Mono:size=11;3
font-1                = FiraCode Nerd Font Mono:size=15;4
modules-left          = i3
modules-center        = date
modules-right         = pulseaudio backlight battery wlan cpu memory tray
wm-restack            = i3
override-redirect     = false
cursor-click          = pointer
cursor-scroll         = ns-resize
enable-ipc            = true

[module/i3]
type                         = internal/i3
format                       = <label-state> <label-mode>
index-sort                   = true
wrapping-scroll              = false
strip-wsnumbers              = true
label-mode-padding           = 2
label-mode-foreground        = ${colors.bg}
label-mode-background        = ${colors.blue}
label-focused                = %name%
label-focused-foreground     = ${colors.bg}
label-focused-background     = ${colors.blue}
label-focused-padding        = 2
label-unfocused              = %name%
label-unfocused-foreground   = ${colors.fg-dim}
label-unfocused-padding      = 2
label-visible                = %name%
label-visible-foreground     = ${colors.fg-dim}
label-visible-underline      = ${colors.blue-alt}
label-visible-padding        = 2
label-urgent                 = %name%
label-urgent-foreground      = ${colors.bg}
label-urgent-background      = ${colors.red}
label-urgent-padding         = 2

[module/date]
type     = internal/date
interval = 5
date     = %a %d %b
time     = %H:%M
label    =  %date%    %time%

[module/pulseaudio]
type                   = internal/pulseaudio
use-ui-max             = false
format-volume          = <ramp-volume> <label-volume>
label-volume           = %percentage%%
label-muted            =  muted
label-muted-foreground = ${colors.fg-dim}
ramp-volume-0          =
ramp-volume-1          =
ramp-volume-2          =
ramp-volume-foreground = ${colors.blue}

[module/backlight]
type                  = internal/backlight
card                  = intel_backlight
use-actual-brightness = true
enable-scroll         = true
format                = <ramp> <label>
label                 = %percentage%%
ramp-0                = 󰃞
ramp-1                = 󰃟
ramp-2                = 󰃠
ramp-foreground       = ${colors.blue}

[module/wlan]
type                          = internal/network
interface                     = wlp85s0f0
interval                      = 5
label-connected               =  %essid%
label-disconnected            =  --
label-disconnected-foreground = ${colors.fg-dim}

[module/battery]
type                          = internal/battery
battery                       = BAT1
adapter                       = AC
full-at                       = 99
low-at                        = 10
poll-interval                 = 10
format-charging               = <animation-charging> <label-charging>
format-discharging            = <ramp-capacity> <label-discharging>
format-full                   = <label-full>
format-low                    = <ramp-capacity> <label-low>
label-charging                = %percentage%%
label-discharging             = %percentage%%
label-full                    =  Full
label-low                     = %percentage%%
label-low-foreground          = ${colors.red}
ramp-capacity-0               =
ramp-capacity-1               =
ramp-capacity-2               =
ramp-capacity-3               =
ramp-capacity-4               =
ramp-capacity-foreground      = ${colors.blue}
animation-charging-0          =
animation-charging-1          =
animation-charging-2          =
animation-charging-3          =
animation-charging-4          =
animation-charging-foreground = ${colors.green}
animation-charging-framerate  = 750

[module/cpu]
type                     = internal/cpu
interval                 = 2
format-prefix            = "󰍛 "
format-prefix-foreground = ${colors.blue}
label                    = %percentage:2%%

[module/memory]
type                     = internal/memory
interval                 = 3
format-prefix            = "󰾆 "
format-prefix-foreground = ${colors.blue}
label                    = %percentage_used:2%%

[module/tray]
type         = internal/tray
tray-padding = 6px
tray-maxsize = 20
